services:
  postgres:
    image: postgres:16-alpine
    container_name: agendamed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agendamed
    ports:
      - '5432:5432'
    volumes:
      - agendamed_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d agendamed']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agendamed_postgres_data:

